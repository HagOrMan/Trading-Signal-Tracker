# config.toml — user profile, thresholds, benchmarks.
# Edit values to suit. All values are read once on startup.

[user_profile]
age_range = "30-40"          # informational only, surfaced on Portfolio Check
horizon_years = 40           # long-term horizon — drives advice framing
risk_tolerance = "moderate"  # one of: conservative | moderate | aggressive
location = "Burlington, ON"

[thresholds]
drawdown_pct = 15            # drawdown_significant fires when current price > this % below 1y high
vol_lookback_years = 2       # window used for vol-regime percentile rank
vol_window_days = 30         # rolling window for realized volatility
ma_short_window = 50         # short MA for crossover detection
ma_long_window = 200         # long MA for crossover detection
crossover_lookback_days = 30 # only flag crossovers that happened within this window
new_high_low_lookback_days = 5  # only flag new 52w highs/lows within this window
correlation_window_days = 60 # rolling window for benchmark correlation
correlation_drop_threshold = 0.3  # decoupling fires when 60d corr drops by this much vs 1y avg

[benchmarks]
default = "SPY"              # used for correlation_decoupling observation
canadian = "XIC.TO"          # informational fallback for TSX-heavy portfolios

[honesty_layer]
forward_horizons_months = [1, 3, 6, 12]
# Sample-size tiers (DEC-011): very_low < 5 <= low < 15 <= moderate < 30 <= good
tier_low = 5
tier_moderate = 15
tier_good = 30
